<script>
/* ----------------------------
   GLOBAL STATE
---------------------------- */

let mediaRecorder = null;
let stream = null;
let chunks = [];
let lastBlob = null;

let session = null;

/* ----------------------------
   LOAD ONNX MODEL
---------------------------- */

async function loadModel() {
    session = await ort.InferenceSession.create("catmeows.onnx");
    console.log("ONNX model loaded");
}

$(document).ready(function () {
    loadModel();
});

/* ----------------------------
   MIC RECORDING
---------------------------- */
async function getAudioBuffer(file) {
    const arrayBuffer = await file.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    return await audioCtx.decodeAudioData(arrayBuffer);
}
  function frameSignal(signal, frameSize, hopSize) {
    const frames = [];

    for (let i = 0; i < signal.length; i += hopSize) {
        frames.push(signal.slice(i, i + frameSize));
    }

    return frames;
}
  function hzToMel(hz) {
    return 2595 * Math.log10(1 + hz / 700);
}

function melToHz(mel) {
    return 700 * (Math.pow(10, mel / 2595) - 1);
}
  function computeMFCC(audioBuffer, sampleRate = 16000) {
    const signal = audioBuffer.getChannelData(0);

    const frameSize = 1024;
    const hopSize = 512;

    const frames = frameSignal(signal, frameSize, hopSize);

    const mfccs = [];

    for (let frame of frames) {
        if (frame.length < frameSize) continue;

        // 1. apply window (Hamming)
        for (let i = 0; i < frame.length; i++) {
            frame[i] *= 0.54 - 0.46 * Math.cos((2 * Math.PI * i) / frame.length);
        }

        // 2. FFT (using FFT.js)
        const fft = new FFT(frameSize);
        const out = fft.createComplexArray();
        const input = fft.toComplexArray(frame);

        fft.transform(out, input);

        // 3. magnitude spectrum
        const mags = [];
        for (let i = 0; i < frameSize / 2; i++) {
            const re = out[2 * i];
            const im = out[2 * i + 1];
            mags.push(Math.sqrt(re * re + im * im));
        }

        // 4. log (simplified MFCC step)
        const logEnergies = mags.map(m => Math.log(m + 1e-8));

        mfccs.push(logEnergies.slice(0, 13)); // approximate MFCCs
    }

    // 5. average over time (like librosa.mean)
    const result = new Array(13).fill(0);

    for (let i = 0; i < mfccs.length; i++) {
        for (let j = 0; j < 13; j++) {
            result[j] += mfccs[i][j];
        }
    }

    return result.map(v => v / mfccs.length);
}
$("#startMic").click(async () => {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(stream);
        chunks = [];

        mediaRecorder.ondataavailable = (e) => {
            chunks.push(e.data);
        };

        mediaRecorder.onstop = async () => {
            lastBlob = new Blob(chunks, { type: "audio/webm" });

            // playback
            const url = URL.createObjectURL(lastBlob);
            $("#player").attr("src", url);

            const arrayBuffer = await lastBlob.arrayBuffer();
            processAudio(arrayBuffer);
        };

        mediaRecorder.start();
        $("#status").text("Recording...");
    } catch (err) {
        console.error(err);
        $("#status").text("Mic error");
    }
});

$("#stopMic").click(() => {
    if (!mediaRecorder || mediaRecorder.state !== "recording") return;

    mediaRecorder.stop();

    if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
    }

    $("#status").text("Processing...");
});

/* ----------------------------
   FILE UPLOAD
---------------------------- */

$("#fileInput").on("change", async function (e) {
    const file = e.target.files[0];

    const url = URL.createObjectURL(file);
    $("#player").attr("src", url);

    const arrayBuffer = await file.arrayBuffer();
    processAudio(arrayBuffer);
});

/* ----------------------------
   PLAY LAST RECORDING
---------------------------- */

$("#playLast").click(() => {
    if (!lastBlob) return;

    const url = URL.createObjectURL(lastBlob);
    const audio = new Audio(url);
    audio.play();
});

/* ----------------------------
   AUDIO PIPELINE
---------------------------- */

async function processAudio(arrayBuffer) {
    const audioCtx = new AudioContext({ sampleRate: 16000 });

    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

    const features = computeMFCC(audioBuffer);
    console.log("FEATURES:", features);
    runInference(features);
}

/* ----------------------------
   SIMPLE MFCC APPROX (matches Python shape 13)
---------------------------- */

function extractMFCC(audioBuffer) {
    const data = audioBuffer.getChannelData(0);

    const size = 13;
    let features = new Array(size).fill(0);

    const step = Math.floor(data.length / size);

    for (let i = 0; i < size; i++) {
        let sum = 0;

        for (let j = 0; j < step; j++) {
            sum += data[i * step + j] || 0;
        }

        features[i] = sum / step;
    }

    return features;
}

/* ----------------------------
   ONNX INFERENCE
---------------------------- */

async function runInference(features) {
    if (!session) {
        $("#result").text("Model not loaded");
        return;
    }

   const inputData = new Float32Array(features);

const input = new ort.Tensor(
    "float32",
    inputData,
    [1, 13]
);

    const feeds = {};
    feeds[session.inputNames[0]] = input;

    const results = await session.run(feeds);

    const output = results[session.outputNames[0]];
    const data = output.data;

    const labels = [
        "annoyed (brushing)",
        "feed me",
        "attention/stress"
    ];

    let maxIndex = 0;
let maxVal = data[0];

for (let i = 1; i < data.length; i++) {
    if (data[i] > maxVal) {
        maxVal = data[i];
        maxIndex = i;
    }
}

    $("#result").text(labels[maxIndex]);
}

</script>
