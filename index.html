  <body>
<section class="hero is-fullheight is-dark is-bold">
  <div class="hero-body is-flex is-justify-content-center is-align-items-center">

    <div class="has-text-centered">

      <h1 class="title is-1">Kittranslator</h1>
      <h2 class="subtitle is-4">Cat meow emotion detector test</h2>

      <div class="buttons is-centered">
        <button class="button is-primary" id="startMic">Start Mic</button>
        <button class="button is-danger" id="stopMic">Stop Mic</button>
        <button class="button is-link" id="playLast">Play Last Recording</button>
      </div>

      <br>

      <div class="file has-name is-centered is-flex is-justify-content-center">
        <label class="file-label">
          <input class="file-input" type="file" id="fileInput" accept="audio/*">
          <span class="file-cta">
            <span class="file-label">Upload Audio</span>
          </span>
        </label>
      </div>

      <br>

      <p id="status" class="has-text-white">Idle</p>
      <h3 id="result" class="title is-4 has-text-white">Waiting...</h3>

      <audio id="player" controls></audio>

    </div>
  </div>
          <a href="https://autoupdatingbsod.github.io" class="button is-link centered">About the Author</a>
</section>





<script>
/* ----------------------------
   GLOBAL STATE
---------------------------- */

let mediaRecorder = null;
let stream = null;
let chunks = [];
let lastBlob = null;

let session = null;
const mean = [
 -15.11056098,
 -15.06655388,
 -14.79963755,
 -12.10701173,
 -8.3361578,
 -6.9080754,
 -6.8050199,
 -7.7387828,
 -9.43176519,
 -12.75636557,
 -14.75740773,
 -15.1060916,
 -15.12521379
];

const scale = [
 1.19643364,
 1.3112811,
 1.71614279,
 3.50026776,
 2.96512775,
 2.44709461,
 2.32429692,
 2.46965986,
 2.5462934,
 2.79167644,
 1.651525,
 1.21636359,
 1.21713445
];
/* ----------------------------
   LOAD ONNX MODEL
---------------------------- */

async function loadModel() {
    session = await ort.InferenceSession.create("catmeows.onnx");
    console.log("ONNX model loaded");
    console.log(session.inputNames);
    console.log(session.outputNames);
}

$(document).ready(function () {
    loadModel();

});

/* ----------------------------
   MIC RECORDING
---------------------------- */
async function getAudioBuffer(file) {
    const arrayBuffer = await file.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    return await audioCtx.decodeAudioData(arrayBuffer);
}
  
$("#startMic").click(async () => {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(stream);
        chunks = [];

        mediaRecorder.ondataavailable = (e) => {
            chunks.push(e.data);
        };

        mediaRecorder.onstop = async () => {
            lastBlob = new Blob(chunks, { type: "audio/webm" });

            // playback
            const url = URL.createObjectURL(lastBlob);
            $("#player").attr("src", url);

            const arrayBuffer = await lastBlob.arrayBuffer();
            processAudio(arrayBuffer);
        };

        mediaRecorder.start();
        $("#status").text("Recording...");
    } catch (err) {
        console.error(err);
        $("#status").text("Mic error");
    }
});

$("#stopMic").click(() => {
    if (!mediaRecorder || mediaRecorder.state !== "recording") return;

    mediaRecorder.stop();

    if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
    }

    $("#status").text("Processing...");
});

/* ----------------------------
   FILE UPLOAD
---------------------------- */
function extractFeatures(audioBuffer) {
    const data = audioBuffer.getChannelData(0);

    const features = new Array(13).fill(0);
    const block = Math.floor(data.length / 13);

    for (let i = 0; i < 13; i++) {
        let sum = 0;

        for (let j = 0; j < block; j++) {
            const v = data[i * block + j];
            sum += v * v;
        }

        features[i] = Math.log(sum / block + 1e-8);
    }

    return features;
}
$("#fileInput").on("change", async function (e) {
    const file = e.target.files[0];

    const url = URL.createObjectURL(file);
    $("#player").attr("src", url);

    const arrayBuffer = await file.arrayBuffer();
    processAudio(arrayBuffer);
});

/* ----------------------------
   PLAY LAST RECORDING
---------------------------- */

$("#playLast").click(() => {
    if (!lastBlob) return;

    const url = URL.createObjectURL(lastBlob);
    const audio = new Audio(url);
    audio.play();
});

/* ----------------------------
   AUDIO PIPELINE
---------------------------- */

async function processAudio(arrayBuffer) {
    const audioCtx = new AudioContext({ sampleRate: 16000 });

    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

const features = extractFeatures(audioBuffer);
console.log("Raw features:", features);
for (let i = 0; i < 13; i++) {
    features[i] = (features[i] - mean[i]) / scale[i];
}

console.log("Normalized features:", features);

runInference(features);
}

/* ----------------------------
   SIMPLE MFCC APPROX (matches Python shape 13)
---------------------------- */



/* ----------------------------
   ONNX INFERENCE
---------------------------- */

async function runInference(features) {
    const input = new ort.Tensor(
        "float32",
        new Float32Array(features),
        [1, 13]
    );
    console.log(input.dims);
    console.log(features);
    const feeds = {};
    feeds[session.inputNames[0]] = input;

    const results = await session.run(feeds);

    const output = results[session.outputNames[0]];
    const data = Array.from(output.data);
  console.log("Raw output:", data);

    const labels = [
        "annoyed (brushing)",
        "feed me",
        "attention/stress"
    ];

    let maxIndex = 0;

    for (let i = 1; i < data.length; i++) {
        if (data[i] > data[maxIndex]) {
            maxIndex = i;
        }
    }

    $("#result").text(labels[maxIndex]);
}


</script>

</body>
</html>
